<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slay OS ✦ Slay the Day</title>
  <meta name="description" content="Slay OS - A premium, Y2K cyber-chic web operating system with draggable windows, markdown devlogs, a terminal console, and notes widget.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">✦</div>
      <h1 class="login-title">Slay OS</h1>
      <p class="login-subtitle" id="login-subtitle">Set up your machine</p>
      
      <div id="setup-form" class="login-form">
        <label class="login-label" for="setup-pcname">What do you want to call this PC?</label>
        <input type="text" id="setup-pcname" class="login-input" placeholder="e.g. my-slay-pc" autocomplete="off">
        <label class="login-label" for="setup-password">Choose a password</label>
        <input type="password" id="setup-password" class="login-input" placeholder="Something you'll remember">
        <button id="setup-submit" class="login-btn">Boot Up</button>
        <p class="login-error" id="setup-error"></p>
      </div>

      <div id="login-form" class="login-form" style="display:none;">
        <label class="login-label" for="login-password">Password</label>
        <input type="password" id="login-password" class="login-input" placeholder="Enter your password">
        <button id="login-submit" class="login-btn">Log In</button>
        <p class="login-error" id="login-error"></p>
      </div>
    </div>
  </div>

  <div class="wallpaper-container">
    <div class="vignette"></div>
  </div>

  <header id="top-bar">
    <div class="top-bar-left">
      <span class="system-brand" id="brand-logo">✦ SlayOS</span>
      <nav class="system-menu">
        <button class="menu-trigger" data-window="welcome">About</button>
        <button class="menu-trigger" data-window="notes">Notes</button>
        <button class="menu-trigger" data-window="devlogs">Devlogs</button>
        <button class="menu-trigger" data-window="terminal">Terminal</button>
        <button class="menu-trigger" data-window="roulette">Roulette</button>
        <button class="menu-trigger" data-window="asciicam">ASCII Cam</button>
      </nav>
    </div>
    <div class="top-bar-center">
      <span class="system-status">Slaying since 2026</span>
    </div>
    <div class="top-bar-right">
      <div class="system-indicators">
        <span class="indicator-icon" title="Wi-Fi Connected">📶</span>
        <span class="indicator-icon" title="Battery: 100% Slayed">🔋 100%</span>
      </div>
      <div id="timeElement" class="clock-display">00/00/0000 00:00:00 AM</div>
    </div>
  </header>

  <main id="desktop">
    
    <div class="desktop-icons">
      
      <div class="desktop-icon" data-window="welcome" id="icon-welcome">
        <div class="icon-wrapper welcome-icon">
          <svg viewBox="0 0 24 24" width="36" height="36" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
          </svg>
        </div>
        <span class="icon-label">Welcome</span>
      </div>

      <div class="desktop-icon" data-window="notes" id="icon-notes">
        <div class="icon-wrapper notes-icon">
          <svg viewBox="0 0 24 24" width="36" height="36" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"></path>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
          </svg>
        </div>
        <span class="icon-label">Slay Notes</span>
      </div>

      <div class="desktop-icon" data-window="devlogs" id="icon-devlogs">
        <div class="icon-wrapper devlogs-icon">
          <svg viewBox="0 0 24 24" width="36" height="36" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
          </svg>
        </div>
